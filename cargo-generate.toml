[template]
cargo_generate_version = ">=0.10.0"

[placeholders.backend]
type = "string"
prompt = "Choose backend type"
choices = ["actix", "tauri", "vanilla", "nodejs", "php"]
default = "actix"

[placeholders]
api_port = { type = "string", prompt = "Enter the API port (for actix/nodejs/php)", default = "1421", regex = "^[0-9]+$" }

[conditional.'backend == "tauri"'.placeholders]
app_identifier = { type = "string", prompt = "Enter the app identifier (e.g., com.yourcompany.appname)", default = "com.tauri.app" }
window_title = { type = "string", prompt = "Enter the window title", default = "TAVERN App" }
window_width = { type = "string", prompt = "Enter the window width", default = "800" }
window_height = { type = "string", prompt = "Enter the window height", default = "600" }
package_manager = { type = "string", prompt = "Choose a package manager (npm, yarn, pnpm)", default = "pnpm", choices = ["npm", "pnpm", "yarn"] }

[conditional.'backend == "tauri"']
ignore = [
    "src-actix/**/*",
    "server/**/*",
    "app/**/*",
    "routes/**/*",
    "resources/**/*",
    "public/**/*",
    "bootstrap/**/*",
    "composer.json",
    ".env.example",
    "Cargo-actix.toml",
]

[conditional.'backend == "actix"']
ignore = [
    "src-tauri/**/*",
    "server/**/*",
    "app/**/*",
    "routes/**/*",
    "resources/**/*",
    "public/**/*",
    "bootstrap/**/*",
    "composer.json",
    ".env.example",
    "Cargo-tauri.toml",
]

[conditional.'backend == "vanilla"']
ignore = [
    "src-actix/**/*",
    "src-tauri/**/*",
    "server/**/*",
    "app/**/*",
    "routes/**/*",
    "resources/**/*",
    "public/**/*",
    "bootstrap/**/*",
    "composer.json",
    ".env.example",
    "Cargo-actix.toml",
    "Cargo-tauri.toml",
]

[conditional.'backend == "nodejs"']
ignore = [
    "src-actix/**/*",
    "src-tauri/**/*",
    "app/**/*",
    "routes/**/*",
    "resources/**/*",
    "public/**/*",
    "bootstrap/**/*",
    "composer.json",
    ".env.example",
    "Cargo-actix.toml",
    "Cargo-tauri.toml",
]

[conditional.'backend == "php"']
ignore = [
    "src-actix/**/*",
    "src-tauri/**/*",
    "server/**/*",
    "Cargo-actix.toml",
    "Cargo-tauri.toml",
]
exclude = [
    "resources/views/**/*.blade.php",
]
